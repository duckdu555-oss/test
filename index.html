<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glass Login</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #ffffff;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 100%;
      max-width: 390px;
      padding: 20px;
    }

    /* 투명 유리판 로그인폼 */
    .glass-panel {
      width: 100%;
      padding: 28px 22px 24px;
      border-radius: 28px;
      background: transparent;
      backdrop-filter: blur(2px);
      -webkit-backdrop-filter: blur(2px);

      border-top: 1px solid rgba(255, 255, 255, 0.95);
      border-left: 1px solid rgba(255, 255, 255, 0.95);
      border-right: 1px solid rgba(0, 0, 0, 0.08);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);

      box-shadow:
        0 18px 45px rgba(0, 0, 0, 0.10),
        inset 1px 1px 0 rgba(255, 255, 255, 0.9),
        inset -1px -1px 0 rgba(0, 0, 0, 0.05);
    }

    /* 12시 로고/사진 자리 */
    .logo-area {
      height: 115px;
      margin-bottom: 24px;
      border-radius: 22px;
      background: transparent;

      border-top: 1px solid rgba(255, 255, 255, 0.9);
      border-left: 1px solid rgba(255, 255, 255, 0.9);
      border-right: 1px solid rgba(0, 0, 0, 0.08);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);

      box-shadow:
        inset 1px 1px 0 rgba(255, 255, 255, 0.85),
        inset -1px -1px 0 rgba(0, 0, 0, 0.04),
        0 8px 18px rgba(0, 0, 0, 0.04);

      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .logo-area img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .logo-placeholder {
      color: rgba(0, 0, 0, 0.35);
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .input-box {
      margin-bottom: 14px;
    }

    .input-box input {
      width: 100%;
      height: 50px;
      padding: 0 16px;
      border-radius: 16px;
      border: none;
      outline: none;
      background: transparent;

      border-top: 1px solid rgba(255, 255, 255, 0.9);
      border-left: 1px solid rgba(255, 255, 255, 0.9);
      border-right: 1px solid rgba(0, 0, 0, 0.10);
      border-bottom: 1px solid rgba(0, 0, 0, 0.10);

      box-shadow:
        inset 1px 1px 0 rgba(255, 255, 255, 0.85),
        inset -1px -1px 0 rgba(0, 0, 0, 0.04),
        0 5px 12px rgba(0, 0, 0, 0.04);

      font-size: 15px;
      color: #222;
    }

    .input-box input::placeholder {
      color: rgba(0, 0, 0, 0.42);
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 18px;
    }

    .btn-row button {
      flex: 1;
      height: 48px;
      border-radius: 16px;
      border: none;
      cursor: pointer;
      background: transparent;

      border-top: 1px solid rgba(255, 255, 255, 0.95);
      border-left: 1px solid rgba(255, 255, 255, 0.95);
      border-right: 1px solid rgba(0, 0, 0, 0.12);
      border-bottom: 1px solid rgba(0, 0, 0, 0.12);

      box-shadow:
        inset 1px 1px 0 rgba(255, 255, 255, 0.9),
        inset -1px -1px 0 rgba(0, 0, 0, 0.05),
        0 7px 15px rgba(0, 0, 0, 0.06);

      color: #222;
      font-size: 15px;
      font-weight: bold;
      transition: 0.15s;
    }

    .btn-row button:active {
      transform: translateY(2px);
      box-shadow:
        inset 1px 1px 0 rgba(255, 255, 255, 0.7),
        inset -1px -1px 0 rgba(0, 0, 0, 0.08),
        0 3px 8px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>

<body>
  <div class="login-wrap">
    <div class="glass-panel">

      <div class="logo-area">
        <img src="image/logo.png" alt="로고" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
        <div class="logo-placeholder" style="display:none;">LOGO IMAGE</div>
      </div>

      <div class="input-box">
        <input type="text" placeholder="아이디">
      </div>

      <div class="input-box">
        <input type="password" placeholder="비밀번호">
      </div>

      <div class="btn-row">
        <button type="button">로그인</button>
        <button type="button">회원가입</button>
      </div>

    </div>
  </div>
</body>
</html>
