<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>홈페이지</title>

  <style>
    /* 웹폰트 연결: 여기어때 잘난체 */
    @font-face {
      font-family: 'Jalnan';
      src: url('https://cdn.jsdelivr.net/gh/webfontworld/goodchoice/Jalnan.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
    }

    body {
      min-height: 100vh;
      background: #c9c9c9;
      font-family: 'Jalnan', 'Do Hyeon', fantasy, sans-serif;
      letter-spacing: 0.5px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow-x: hidden;
    }

    .page {
      width: 100%;
      max-width: 340px;
      min-height: 100vh;
      padding: 70px 22px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 로그인폼 밖 12시 방향 큰 로고 */
    .top-logo {
      width: 100%;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border-radius: 0;
      box-shadow: none;
      overflow: visible;
    }

    .top-logo img {
      width: 100%;
      height: auto;
      max-width: 100%;
      max-height: none;
      object-fit: contain;
      display: block;
    }

    .logo-placeholder {
      width: 92%;
      max-width: 300px;
      height: 100px;
      border-radius: 24px;
      border: 2px dashed rgba(0, 0, 0, 0.18);
      color: rgba(0, 0, 0, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    /* 로그인폼 전체 박스: 바깥 ㅁ 테두리 제거, 로고 폭과 대칭 */
    .login-panel {
      width: 100%;
      padding: 18px 0 0;
      border-radius: 0;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      border: none;
      box-shadow: none;
    }

    .input-box {
      margin-bottom: 11px;
    }

    .input-box input {
      width: 100%;
      height: 44px;
      padding: 0 15px;
      border-radius: 5px;
      outline: none;
      background: #e9e9e9;
      color: #222;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Jalnan', 'Do Hyeon', fantasy, sans-serif;
      border: 2px solid rgba(45, 30, 32, 0.42);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.75),
        inset 0 -2px 0 rgba(0, 0, 0, 0.08),
        0 2px 0 rgba(105, 0, 6, 0.18),
        0 5px 10px rgba(0, 0, 0, 0.06);
    }

    .input-box input::placeholder {
      color: rgba(0, 0, 0, 0.48);
    }

    .btn-base {
      border: 2px solid rgba(45, 30, 32, 0.42);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.5),
        inset 0 -2px 0 rgba(0, 0, 0, 0.12),
        0 2px 0 rgba(105, 0, 6, 0.20),
        0 6px 10px rgba(0, 0, 0, 0.08);
      color: #ffffff;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.25);
      transition: 0.12s;
    }

    /* 로그인 버튼: 회원가입/무기명가입과 동일한 진한 회색 */
    .login-button {
      width: 100%;
      height: 46px;
      margin-top: 4px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 900;
      font-family: 'Jalnan', 'Do Hyeon', fantasy, sans-serif;
      background: linear-gradient(180deg, #bdbdbd 0%, #8f8f8f 48%, #6f6f6f 100%);
      color: #000000;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.35);
    }

    .sub-buttons {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    /* 회원가입 / 무기명가입 폼: 로그인폼보다 진한 회색 */
    .sub-buttons button {
      flex: 1;
      height: 44px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 900;
      font-family: 'Jalnan', 'Do Hyeon', fantasy, sans-serif;
      background: linear-gradient(180deg, #bdbdbd 0%, #8f8f8f 48%, #6f6f6f 100%);
      color: #000000;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.35);
    }

    /* 텔레그램 고객센터 폼: 파란색 */
    .telegram-link {
      margin-top: 12px;
      width: 100%;
      height: 44px;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      text-decoration: none;
      position: relative;
      font-size: 14px;
      font-weight: 900;
      font-family: 'Jalnan', 'Do Hyeon', fantasy, sans-serif;
      background: linear-gradient(180deg, #5ecbff 0%, #1f9eea 48%, #0b6fc6 100%);
    }

    .telegram-mark {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #229ed9;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.18);
      flex: 0 0 auto;
      position: absolute;
      left: calc(50% - 45px);
    }

    .telegram-mark svg {
      width: 14px;
      height: 14px;
      display: block;
      fill: #ffffff;
      margin-left: -1px;
    }

    .customer-text {
      color: #003f7a;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.18);
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }


    button,
    input,
    .telegram-link {
      touch-action: manipulation;
    }

    button:active,
    .telegram-link:active {
      transform: translateY(3px);
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.35),
        inset 0 -2px 0 rgba(0, 0, 0, 0.12),
        0 1px 0 rgba(105, 0, 6, 0.18),
        0 3px 7px rgba(0, 0, 0, 0.06);
    }
  </style>
</head>

<body>
  <main class="page">

    <!-- 로그인폼 밖 12시 방향 큰 로고 -->
    <div class="top-logo">
      <img src="image/logo.png" alt="로고" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
      <div class="logo-placeholder" style="display:none;">LOGO</div>
    </div>

    <!-- 로그인폼 -->
    <section class="login-panel">
      <div class="input-box">
        <input type="text" placeholder="아이디">
      </div>

      <div class="input-box">
        <input type="password" placeholder="비밀번호">
      </div>

      <button type="button" class="login-button btn-base">로그인</button>

      <div class="sub-buttons">
        <button type="button" class="btn-base">회원가입</button>
        <button type="button" class="btn-base">무기명가입</button>
      </div>

      <!-- 텔레그램 고객센터: 링크는 나중에 href만 바꾸면 됨 -->
      <a href="#" class="telegram-link btn-base">
        <span class="telegram-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M21.8 3.4 18.5 20c-.2 1.1-.9 1.4-1.8.9l-5-3.7-2.4 2.3c-.3.3-.5.5-1 .5l.4-5.1 9.3-8.4c.4-.4-.1-.6-.6-.2L5.8 13.5.9 12c-1.1-.3-1.1-1.1.2-1.6L20.3 3c.9-.3 1.7.2 1.5.4z"/>
          </svg>
        </span>
        <span class="customer-text">고객센터</span>
      </a>
    </section>

  </main>
  <script>
    // 모바일에서 더블탭 확대 방지
    document.addEventListener('dblclick', function (e) {
      e.preventDefault();
    }, { passive: false });
  </script>
</body>
</html>
