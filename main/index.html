<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>메인</title>

  <style>
    @font-face {
      font-family: 'Jalnan';
      src: url('https://cdn.jsdelivr.net/gh/webfontworld/goodchoice/Jalnan.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: #b7b7b7;
      font-family: 'Jalnan', Arial, sans-serif;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    .main-box {
      width: 100%;
      max-width: 390px;
      padding: 24px 18px;
      border-radius: 10px;
      background: #d0d0d0;
      border: 1px solid rgba(70, 70, 70, 0.22);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.14);
    }

    .main-logo img {
      width: 100%;
      max-width: 300px;
      height: auto;
      object-fit: contain;
      display: block;
      margin: 0 auto 18px;
    }

    .main-title {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .main-text {
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 14px;
      color: #333;
    }
  </style>
</head>

<body>
  <div class="main-box">
    <div class="main-logo">
      <img src="../image/logo.png" alt="로고">
    </div>
    <div class="main-title">메인 홈페이지</div>
    <div class="main-text">로그인 후 이동되는 임시 메인 화면입니다.</div>
  </div>
</body>
</html>
