<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>관리자</title>

  <style>
    @font-face {
      font-family: 'Jalnan';
      src: url('https://cdn.jsdelivr.net/gh/webfontworld/goodchoice/Jalnan.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      background: #b7b7b7;
      font-family: 'Jalnan', Arial, sans-serif;
      padding: 8px 4px 20px;
      color: #111;
    }

    .admin-login {
      width: 100%;
      max-width: 330px;
      margin: 80px auto 0;
      padding: 20px 16px;
      border-radius: 9px;
      background: #d0d0d0;
      border: 1px solid rgba(70, 70, 70, 0.24);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.16);
      text-align: center;
    }

    .login-title {
      font-size: 22px;
      margin-bottom: 14px;
    }

    .admin-login input {
      width: 100%;
      height: 42px;
      margin-bottom: 9px;
      border-radius: 6px;
      border: 1px solid rgba(60, 60, 60, 0.22);
      outline: none;
      padding: 0 12px;
      background: #eeeeee;
      color: #111;
      font-family: inherit;
      font-size: 14px;
      text-align: center;
    }

    .admin-login button {
      width: 100%;
      height: 42px;
      border-radius: 6px;
      border: 1px solid rgba(60, 60, 60, 0.22);
      background: #8a8a8a;
      color: #000;
      font-family: inherit;
      font-size: 15px;
      cursor: pointer;
    }

    .login-error {
      min-height: 20px;
      margin-top: 9px;
      color: #b00020;
      font-size: 13px;
    }

    .admin-wrap {
      display: none;
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
    }

    .admin-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 5px;
      margin-bottom: 7px;
    }

    .admin-title {
      font-size: 14px;
      white-space: nowrap;
    }

    .admin-actions {
      display: flex;
      gap: 4px;
    }

    .admin-actions button {
      height: 28px;
      padding: 0 6px;
      border: 1px solid rgba(60, 60, 60, 0.25);
      border-radius: 4px;
      background: #8a8a8a;
      color: #000;
      font-family: inherit;
      font-size: 10px;
      cursor: pointer;
      white-space: nowrap;
    }



    .admin-tools {
      display: flex;
      align-items: center;
      gap: 6px;
      margin: 0 0 7px;
    }

    .admin-search {
      width: 100%;
      height: 34px;
      border-radius: 6px;
      border: 1px solid rgba(60, 60, 60, 0.22);
      outline: none;
      padding: 0 10px;
      background: #eeeeee;
      color: #111;
      font-family: Arial, sans-serif;
      font-weight: bold;
      font-size: 12px;
    }

    .admin-search::placeholder {
      color: #666;
    }

    .search-clear-btn {
      flex: 0 0 auto;
      height: 34px;
      padding: 0 10px;
      border: 1px solid rgba(60, 60, 60, 0.25);
      border-radius: 6px;
      background: #9a9a9a;
      color: #000;
      font-family: inherit;
      font-size: 11px;
      cursor: pointer;
      white-space: nowrap;
    }

    .table-box {
      width: 100%;
      overflow-x: hidden;
      background: #d0d0d0;
      border: 1px solid rgba(70, 70, 70, 0.24);
      border-radius: 6px;
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: center;
      table-layout: fixed;
    }

    th,
    td {
      border-bottom: 1px solid rgba(80, 80, 80, 0.18);
      border-right: 1px solid rgba(80, 80, 80, 0.13);
      padding: 3px 1px;
      font-size: 7px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    th {
      background: #9a9a9a;
      color: #000;
    }

    td {
      background: #eeeeee;
      font-family: Arial, sans-serif;
      font-weight: bold;
    }

    .col-action { width: 16%; }
    .col-status { width: 7%; }
    .col-nick { width: 9%; }
    .col-name { width: 9%; }
    .col-bank { width: 10%; }
        .col-account { width: 12%; }
    .col-phone { width: 12%; }
    .col-img { width: 5%; }
    .col-id { width: 9%; }
    .col-pass { width: 6%; }
    .col-expass { width: 6%; }

    .action-buttons {
      display: flex;
      gap: 1px;
      justify-content: center;
      align-items: center;
    }

    .status-btn {
      height: 20px;
      min-width: 25px;
      padding: 0 2px;
      border-radius: 3px;
      border: 1px solid rgba(60, 60, 60, 0.22);
      font-size: 7px;
      cursor: pointer;
      color: #000;
      font-family: Arial, sans-serif;
      font-weight: bold;
    }

    .img-view-btn {
      height: 21px;
      min-width: 44px;
      padding: 0 5px;
      border-radius: 4px;
      border: 1px solid rgba(60, 60, 60, 0.25);
      background: #d7d7d7;
      color: #000;
      font-size: 8px;
      font-family: Arial, sans-serif;
      font-weight: bold;
      cursor: pointer;
      white-space: nowrap;
    }

    .approve-btn {
      background: #9fd39f;
    }

    .reject-btn {
      background: #d89a9a;
    }

    .pending-btn {
      background: #d8d08f;
    }

    .status-approved {
      color: #006400;
    }

    .status-rejected {
      color: #9a0000;
    }

    .status-pending {
      color: #444;
    }



    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      height: 17px;
      padding: 0 4px;
      border-radius: 999px;
      border: 1px solid rgba(0, 0, 0, 0.18);
      font-family: Arial, sans-serif;
      font-size: 7px;
      font-weight: 900;
      line-height: 1;
    }

    .status-badge.status-approved {
      background: #c9f0c9;
      color: #006400;
    }

    .status-badge.status-rejected {
      background: #f3c6c6;
      color: #9a0000;
    }

    .status-badge.status-pending {
      background: #f3eaa6;
      color: #5c5200;
    }

    .image-modal {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(0, 0, 0, 0.78);
    }

    .image-modal.active {
      display: flex;
    }

    .image-modal-box {
      position: relative;
      width: 100%;
      max-width: 520px;
      max-height: 88vh;
      border-radius: 8px;
      background: #111;
      overflow: hidden;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.35);
    }

    .image-modal-close {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 2;
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 22px;
      line-height: 34px;
      cursor: pointer;
    }

    .image-modal img {
      display: block;
      width: 100%;
      max-height: 88vh;
      object-fit: contain;
      background: #111;
    }

    .empty {
      padding: 20px;
      text-align: center;
      color: #333;
      font-size: 13px;
    }

    @media (max-width: 430px) {
      th,
      td {
        font-size: 6px;
        padding: 3px 1px;
      }

      .status-btn {
        height: 19px;
        min-width: 22px;
        font-size: 6px;
        padding: 0 1px;
      }

      .admin-title {
        font-size: 12px;
      }

      .admin-actions button {
        height: 26px;
        font-size: 9px;
        padding: 0 4px;
      }

      .admin-search {
        height: 32px;
        font-size: 11px;
      }

      .search-clear-btn {
        height: 32px;
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="admin-login" id="adminLoginBox">
    <div class="login-title">관리자 로그인</div>
    <input id="adminId" type="text" placeholder="아이디" autocomplete="off">
    <input id="adminPassword" type="password" placeholder="비밀번호" autocomplete="off">
    <button type="button" id="adminLoginBtn">로그인</button>
    <div class="login-error" id="adminLoginError"></div>
  </div>

  <div class="admin-wrap" id="adminWrap">
    <div class="admin-head">
      <div class="admin-title">회원가입 관리자</div>
      <div class="admin-actions">
        <button type="button" id="refreshBtn">새로고침</button>
        <button type="button" id="logoutBtn">로그아웃</button>
        <button type="button" id="clearBtn">전체삭제</button>
      </div>
    </div>

    <div class="admin-tools">
      <input id="adminSearchInput" class="admin-search" type="text" placeholder="아이디 / 닉네임 / 휴대폰번호 검색" autocomplete="off">
      <button type="button" id="searchClearBtn" class="search-clear-btn">초기화</button>
    </div>

    <div class="table-box">
      <table>
        <thead>
          <tr>
            <th class="col-action">승인/거절</th>
            <th class="col-status">상태</th>
            <th class="col-nick">닉네임</th>
            <th class="col-name">이름</th>
            <th class="col-bank">은행정보</th>
<th class="col-account">계좌번호</th>
            <th class="col-phone">휴대폰번호</th>
            <th class="col-id">아이디</th>
            <th class="col-pass">비밀번호</th>
            <th class="col-expass">환전비번</th>
            <th class="col-img">사진1</th>
            <th class="col-img">사진2</th>
          </tr>
        </thead>
        <tbody id="memberTable"></tbody>
      </table>
      <div class="empty" id="emptyText">저장된 회원가입 정보가 없습니다.</div>
    </div>
  </div>

  <div class="image-modal" id="imageModal" aria-hidden="true">
    <div class="image-modal-box">
      <button type="button" class="image-modal-close" id="imageModalClose" aria-label="닫기">×</button>
      <img id="imageModalImg" src="" alt="사진 보기">
    </div>
  </div>

  <script src="../../setting/setting.js?v=38"></script>

  <script>
    const STORAGE_KEY = "signupMembers";
    const ADMIN_SESSION_KEY = "adminLoggedIn";

    const adminLoginBox = document.getElementById("adminLoginBox");
    const adminWrap = document.getElementById("adminWrap");
    const adminId = document.getElementById("adminId");
    const adminPassword = document.getElementById("adminPassword");
    const adminLoginBtn = document.getElementById("adminLoginBtn");
    const adminLoginError = document.getElementById("adminLoginError");

    const memberTable = document.getElementById("memberTable");
    const emptyText = document.getElementById("emptyText");
    const adminSearchInput = document.getElementById("adminSearchInput");
    const searchClearBtn = document.getElementById("searchClearBtn");
    const imageModal = document.getElementById("imageModal");
    const imageModalImg = document.getElementById("imageModalImg");
    const imageModalClose = document.getElementById("imageModalClose");

    function getMembers() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch (e) {
        return [];
      }
    }

    function saveMembers(members) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(members));
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function statusText(status) {
      if (status === "approved") return "승인";
      if (status === "rejected") return "거절";
      return "";
    }

    function statusClass(status) {
      if (status === "approved") return "status-approved";
      if (status === "rejected") return "status-rejected";
      return "status-pending";
    }

    function imageButton(imageObj, index, slot) {
      if (!imageObj || !imageObj.data) return "-";
      return `<button type="button" class="img-view-btn" data-index="${index}" data-slot="${slot}">사진 보기</button>`;
    }

    function getSortedMembersWithIndex() {
      const keyword = String(adminSearchInput ? adminSearchInput.value : "").trim().toLowerCase();

      return getMembers()
        .map(function(member, originalIndex) {
          return { member: member, originalIndex: originalIndex };
        })
        .filter(function(item) {
          if (!keyword) return true;
          const member = item.member || {};
          const searchText = [
            member.userId,
            member.nickname,
            member.phone
          ].join(" ").toLowerCase();
          return searchText.indexOf(keyword) !== -1;
        })
        .sort(function(a, b) {
          const aTime = new Date(a.member.createdAt || 0).getTime() || 0;
          const bTime = new Date(b.member.createdAt || 0).getTime() || 0;
          return bTime - aTime;
        });
    }

    function renderMembers() {
      const wrappedMembers = getSortedMembersWithIndex();
      memberTable.innerHTML = "";

      if (!wrappedMembers.length) {
        emptyText.style.display = "block";
        emptyText.textContent = (adminSearchInput && adminSearchInput.value.trim()) ? "검색 결과가 없습니다." : "저장된 회원가입 정보가 없습니다.";
        return;
      }

      emptyText.style.display = "none";

      wrappedMembers.forEach(function(item) {
        const member = item.member;
        const originalIndex = item.originalIndex;

        if (!member.status) {
          member.status = "pending";
        }

        const currentStatusText = statusText(member.status);
        const statusHtml = currentStatusText
          ? `<span class="status-badge ${statusClass(member.status)}">${currentStatusText}</span>`
          : "";

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td class="col-action">
            <div class="action-buttons">
              <button type="button" class="status-btn approve-btn" data-index="${originalIndex}" data-status="approved">승인</button>
              <button type="button" class="status-btn reject-btn" data-index="${originalIndex}" data-status="rejected">거절</button>
            </div>
          </td>
          <td class="col-status">${statusHtml}</td>
          <td class="col-nick">${escapeHtml(member.nickname)}</td>
          <td class="col-name">${escapeHtml(member.realName)}</td>
          <td class="col-bank">${escapeHtml(member.bank)}</td>
<td class="col-account">${escapeHtml(member.accountNumber)}</td>
          <td class="col-phone">${escapeHtml(member.phone)}</td>
          <td class="col-id">${escapeHtml(member.userId)}</td>
          <td class="col-pass">${escapeHtml(member.password)}</td>
          <td class="col-expass">${escapeHtml(member.exchangePassword)}</td>
          <td class="col-img">${imageButton(member.historyImage1, originalIndex, "historyImage1")}</td>
          <td class="col-img">${imageButton(member.historyImage2, originalIndex, "historyImage2")}</td>
        `;
        memberTable.appendChild(tr);
      });

      // 기존 데이터 중 상태가 비어있는 회원은 대기로 저장
      const members = getMembers();
      let changed = false;
      members.forEach(function(member) {
        if (!member.status) {
          member.status = "pending";
          changed = true;
        }
      });
      if (changed) saveMembers(members);
    }

    function setMemberStatus(index, status) {
      const members = getMembers();
      if (!members[index]) return;

      members[index].status = status;
      saveMembers(members);
      renderMembers();
    }

    memberTable.addEventListener("click", function(e) {
      const statusButton = e.target.closest(".status-btn");
      if (statusButton) {
        const index = Number(statusButton.dataset.index);
        const status = statusButton.dataset.status;

        if (!Number.isNaN(index) && status) {
          setMemberStatus(index, status);
        }
        return;
      }

      const imgButton = e.target.closest(".img-view-btn");
      if (imgButton) {
        const index = Number(imgButton.dataset.index);
        const slot = imgButton.dataset.slot;
        const members = getMembers();
        const imageObj = members[index] && members[index][slot];

        if (imageObj && imageObj.data) {
          openImageModal(imageObj.data);
        }
      }
    });

    function openImageModal(src) {
      imageModalImg.src = src;
      imageModal.classList.add("active");
      imageModal.setAttribute("aria-hidden", "false");
    }

    function closeImageModal() {
      imageModal.classList.remove("active");
      imageModal.setAttribute("aria-hidden", "true");
      imageModalImg.src = "";
    }

    imageModalClose.addEventListener("click", closeImageModal);
    imageModal.addEventListener("click", function(e) {
      if (e.target === imageModal) closeImageModal();
    });

    document.addEventListener("keydown", function(e) {
      if (e.key === "Escape" && imageModal.classList.contains("active")) {
        closeImageModal();
      }
    });

    adminSearchInput.addEventListener("input", renderMembers);
    searchClearBtn.addEventListener("click", function() {
      adminSearchInput.value = "";
      renderMembers();
      adminSearchInput.focus();
    });

    function showAdmin() {
      adminLoginBox.style.display = "none";
      adminWrap.style.display = "block";
      renderMembers();
    }

    function runAdminLogin() {
      const inputId = adminId.value.trim();
      const inputPassword = adminPassword.value.trim();

      const savedAdminId = String(window.ADMIN_ID || "").trim();
      const savedAdminPassword = String(window.ADMIN_PASSWORD || "").trim();

      if (!savedAdminId || !savedAdminPassword) {
        adminLoginError.textContent = "관리자 계정이 아직 설정되지 않았습니다.";
        return;
      }

      if (inputId === savedAdminId && inputPassword === savedAdminPassword) {
        sessionStorage.setItem(ADMIN_SESSION_KEY, "1");
        showAdmin();
      } else {
        adminLoginError.textContent = "관리자 아이디 또는 비밀번호가 맞지 않습니다.";
      }
    }

    adminLoginBtn.addEventListener("click", runAdminLogin);
    adminPassword.addEventListener("keydown", function(e) {
      if (e.key === "Enter") runAdminLogin();
    });

    document.getElementById("refreshBtn").addEventListener("click", renderMembers);

    document.getElementById("logoutBtn").addEventListener("click", function() {
      sessionStorage.removeItem(ADMIN_SESSION_KEY);
      location.reload();
    });

    document.getElementById("clearBtn").addEventListener("click", function() {
      if (confirm("전체 삭제할까요?")) {
        localStorage.removeItem(STORAGE_KEY);
        renderMembers();
      }
    });

    if (sessionStorage.getItem(ADMIN_SESSION_KEY) === "1") {
      showAdmin();
    }
  </script>
</body>
</html>
