<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>회원가입</title>

  <style>
    @font-face {
      font-family: 'Jalnan';
      src: url('https://cdn.jsdelivr.net/gh/webfontworld/goodchoice/Jalnan.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      touch-action: manipulation;
    }

    body {
      min-height: 100vh;
      background: #b7b7b7;
      font-family: 'Jalnan', 'Do Hyeon', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 26px 16px 34px;
      color: #111;
    }

    .signup-wrap {
      width: 100%;
      max-width: 390px;
    }

    .logo-area {
      width: 100%;
      margin: 0 auto 12px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-area img {
      width: 100%;
      max-width: 340px;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .signup-panel {
      width: 100%;
      padding: 18px 15px 17px;
      border-radius: 9px;
      background: #d0d0d0;
      border: 1px solid rgba(80, 80, 80, 0.18);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
    }

    .signup-title {
      text-align: center;
      font-size: 23px;
      margin-bottom: 15px;
      color: #111;
      letter-spacing: 1px;
    }

    .form-row {
      margin-bottom: 10px;
    }

    .form-row label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      color: #171717;
    }

    .form-row input,
    .form-row select {
      width: 100%;
      height: 43px;
      border-radius: 6px;
      border: 1px solid rgba(60, 60, 60, 0.22);
      outline: none;
      padding: 0 12px;
      background: #eeeeee;
      color: #111;
      font-family: inherit;
      font-size: 14px;
    }

    .phone-row,
    .verify-row {
      display: flex;
      gap: 7px;
    }

    .phone-row input,
    .verify-row input {
      flex: 1;
    }

    .small-btn {
      width: 105px;
      height: 43px;
      border-radius: 6px;
      border: 1px solid rgba(60, 60, 60, 0.22);
      background: #8f8f8f;
      color: #000;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    .submit-btn {
      width: 100%;
      height: 48px;
      margin-top: 10px;
      border-radius: 7px;
      border: 1px solid rgba(60, 60, 60, 0.22);
      background: #8a8a8a;
      color: #000;
      font-family: inherit;
      font-size: 17px;
      cursor: pointer;
    }

    .back-link {
      display: block;
      margin-top: 12px;
      text-align: center;
      color: #222;
      text-decoration: none;
      font-size: 14px;
    }

    .notice {
      margin-top: 8px;
      min-height: 18px;
      text-align: center;
      font-size: 13px;
      color: #004f9e;
    }

    @media (max-width: 380px) {
      body {
        padding-top: 18px;
      }

      .logo-area img {
        max-width: 300px;
      }

      .signup-panel {
        padding: 16px 13px;
      }

      .small-btn {
        width: 96px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="signup-wrap">

    <div class="logo-area">
      <img src="../image/logo.png" alt="로고">
    </div>

    <form class="signup-panel" id="signupForm">
      <div class="signup-title">회원가입</div>

      <div class="form-row">
        <label for="userId">아이디</label>
        <input id="userId" name="userId" type="text" autocomplete="username" required>
      </div>

      <div class="form-row">
        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required>
      </div>

      <div class="form-row">
        <label for="nickname">닉네임</label>
        <input id="nickname" name="nickname" type="text" required>
      </div>

      <div class="form-row">
        <label for="phone">휴대폰번호</label>
        <div class="phone-row">
          <input id="phone" name="phone" type="tel" inputmode="numeric" placeholder="숫자만 입력" required>
          <button class="small-btn" type="button" id="sendCodeBtn">인증번호전송</button>
        </div>
      </div>

      <div class="form-row">
        <label for="verifyCode">인증번호</label>
        <div class="verify-row">
          <input id="verifyCode" name="verifyCode" type="text" inputmode="numeric" placeholder="인증번호 입력" required>
          <button class="small-btn" type="button" id="verifyBtn">인증번호 확인</button>
        </div>
      </div>

      <div class="form-row">
        <label for="realName">이름</label>
        <input id="realName" name="realName" type="text" required>
      </div>

      <div class="form-row">
        <label for="bank">은행정보</label>
        <select id="bank" name="bank" required>
          <option value="">은행 선택</option>
          <option>국민은행</option>
          <option>신한은행</option>
          <option>우리은행</option>
          <option>하나은행</option>
          <option>농협은행</option>
          <option>기업은행</option>
          <option>카카오뱅크</option>
          <option>토스뱅크</option>
          <option>케이뱅크</option>
        </select>
      </div>

      <div class="form-row">
        <label for="accountHolder">예금주</label>
        <input id="accountHolder" name="accountHolder" type="text" required>
      </div>

      <div class="form-row">
        <label for="accountNumber">계좌번호</label>
        <input id="accountNumber" name="accountNumber" type="text" inputmode="numeric" required>
      </div>

      <div class="form-row">
        <label for="exchangePassword">환전비밀번호</label>
        <input id="exchangePassword" name="exchangePassword" type="password" inputmode="numeric" maxlength="4" placeholder="4자리" required>
      </div>

      <div class="notice" id="noticeText"></div>

      <button class="submit-btn" type="submit">회원가입</button>
      <a class="back-link" href="../home/home.html">로그인으로 돌아가기</a>
    </form>
  </div>

  <script>
    let verified = false;
    const noticeText = document.getElementById("noticeText");

    document.getElementById("sendCodeBtn").addEventListener("click", function() {
      noticeText.textContent = "인증번호가 전송되었습니다.";
    });

    document.getElementById("verifyBtn").addEventListener("click", function() {
      const code = document.getElementById("verifyCode").value.trim();

      if (code.length > 0) {
        verified = true;
        noticeText.textContent = "인증번호 확인 완료";
      } else {
        verified = false;
        noticeText.textContent = "인증번호를 입력하세요.";
      }
    });

    document.getElementById("signupForm").addEventListener("submit", function(e) {
      e.preventDefault();

      if (!verified) {
        noticeText.textContent = "휴대폰 인증을 먼저 완료하세요.";
        return;
      }

      noticeText.textContent = "회원가입 정보 입력 완료";
      alert("회원가입 정보 입력 완료");
    });

    // 더블탭 확대 방지
    let lastTouchEnd = 0;
    document.addEventListener("touchend", function(event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
  </script>
</body>
</html>
