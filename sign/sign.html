<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>회원가입</title>

  <style>
    @font-face {
      font-family: 'Jalnan';
      src: url('https://cdn.jsdelivr.net/gh/webfontworld/goodchoice/Jalnan.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      touch-action: manipulation;
    }

    body {
      min-height: 100vh;
      background: #b7b7b7;
      font-family: 'Jalnan', 'Do Hyeon', sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 26px 16px 34px;
      color: #111;
    }

    .signup-wrap {
      width: 100%;
      max-width: 390px;
    }

    .logo-area {
      width: 100%;
      margin: 0 auto 12px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo-area img {
      width: 100%;
      max-width: 340px;
      height: auto;
      display: block;
      object-fit: contain;
    }

    .signup-panel {
      width: 100%;
      padding: 15px 15px 17px;
      border-radius: 9px;
      background: #d0d0d0;
      border: 1px solid rgba(80, 80, 80, 0.18);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.12);
    }

    .signup-title {
      text-align: center;
      font-size: 23px;
      margin-bottom: 15px;
      color: #111;
      letter-spacing: 1px;
    }

    .form-row {
      margin-bottom: 10px;
    }

    .form-row label {
      display: block;
      width: 100%;
      margin-bottom: 6px;
      font-size: 14px;
      color: #171717;
      text-align: center;
      letter-spacing: 0.4px;
    }

    .form-row input,
    .form-row select {
      width: 100%;
      height: 43px;
      border-radius: 6px;
      border: 1px solid rgba(60, 60, 60, 0.22);
      outline: none;
      padding: 0 12px;
      background: #eeeeee;
      color: #111;
      font-family: inherit;
      font-size: 14px;
      text-align: center;
      text-align-last: center;
    }

    .form-row select option {
      font-family: Arial, sans-serif;
      color: #111;
      background: #fff;
    }

    .phone-row {
      display: block;
    }

    .small-btn {
      width: 105px;
      height: 43px;
      border-radius: 6px;
      border: 1px solid rgba(60, 60, 60, 0.22);
      background: #8f8f8f;
      color: #000;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
    }

    .submit-btn {
      width: 100%;
      height: 48px;
      margin-top: 10px;
      border-radius: 7px;
      border: 1px solid rgba(60, 60, 60, 0.22);
      background: linear-gradient(180deg, #ffffff 0%, #e2e3e8 52%, #c9cbd2 100%);
      color: #fff;
      font-family: inherit;
      font-size: 17px;
      cursor: pointer;
    }

    .back-link {
      display: block;
      margin-top: 12px;
      text-align: center;
      color: #222;
      text-decoration: none;
      font-size: 14px;
    }


    .upload-title {
      margin: 12px 0 8px;
      text-align: center;
      font-size: 15px;
      color: #111;
      letter-spacing: 0.5px;
    }

    .form-row input[type="file"] {
      padding: 9px 8px;
      height: auto;
      font-size: 12px;
      background: #eeeeee;
    }

    .notice {
      margin-top: 8px;
      min-height: 18px;
      text-align: center;
      font-size: 13px;
      color: #004f9e;
    }

    @media (max-width: 380px) {
      body {
        padding-top: 18px;
      }

      .logo-area img {
        max-width: 300px;
      }

      .signup-panel {
        padding: 16px 13px;
      }

      .small-btn {
        width: 96px;
        font-size: 12px;
      }
    }
  
    /* 입력/버튼 클릭 효과 */
    .form-row input,
    .form-row select,
    .small-btn,
    .submit-btn {
      transition:
        transform 0.12s ease,
        box-shadow 0.12s ease,
        filter 0.12s ease,
        background 0.12s ease;
    }

    .form-row input:focus,
    .form-row select:focus {
      transform: translateY(1px);
      background: #f4f4f4;
      box-shadow:
        inset 0 2px 5px rgba(0, 0, 0, 0.13),
        0 0 0 2px rgba(255, 255, 255, 0.50);
    }

    .small-btn:active,
    .submit-btn:active {
      transform: translateY(2px) scale(0.985);
      filter: brightness(0.92);
      box-shadow:
        inset 0 2px 4px rgba(0, 0, 0, 0.22),
        0 2px 6px rgba(0, 0, 0, 0.12);
    }

    .form-row.error input,
    .form-row.error select {
      border-color: rgba(190, 0, 20, 0.7);
      box-shadow:
        inset 0 1px 3px rgba(190, 0, 20, 0.12),
        0 0 0 2px rgba(190, 0, 20, 0.12);
    }

  
    /* 회원가입 버튼 빛나는 효과 */
    .shine-btn {
      position: relative;
      overflow: hidden;
      animation: signupGlow 2.2s ease-in-out infinite;
    }

    .shine-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 80%;
      height: 100%;
      background: linear-gradient(
        110deg,
        transparent,
        rgba(255, 255, 255, 0.55),
        transparent
      );
      transform: skewX(-18deg);
      animation: signupShine 2.8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes signupGlow {
      0%, 100% {
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.55),
          0 5px 12px rgba(0, 0, 0, 0.16);
      }
      50% {
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.75),
          0 0 16px rgba(255, 255, 255, 0.75),
          0 7px 18px rgba(0, 0, 0, 0.20);
      }
    }

    @keyframes signupShine {
      0% { left: -120%; }
      45% { left: 140%; }
      100% { left: 140%; }
    }

    .complete-modal {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
      background: rgba(0, 0, 0, 0.32);
      -webkit-backdrop-filter: blur(4px);
      backdrop-filter: blur(4px);
    }

    .complete-modal.active {
      display: flex;
    }

    .complete-box {
      width: 100%;
      max-width: 290px;
      padding: 28px 18px 18px;
      border-radius: 10px;
      background: #d7d7d7;
      border: 1px solid rgba(70, 70, 70, 0.28);
      box-shadow: 0 14px 34px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    .complete-title {
      margin-bottom: 22px;
      font-size: 22px;
      color: #111;
      text-align: center;
    }

    .complete-confirm {
      width: 130px;
      height: 42px;
      margin: 0 auto;
      display: block;
      border-radius: 7px;
      border: 1px solid rgba(60, 60, 60, 0.22);
      background: #8a8a8a;
      color: #000;
      font-family: inherit;
      font-size: 16px;
      cursor: pointer;
      text-align: center;
    }


    /* v59 회원가입 화면 시각 보정: 기능 유지 */
    .signup-panel {
      border-radius: 13px;
      background: linear-gradient(180deg, rgba(222,222,222,0.96) 0%, rgba(205,205,205,0.96) 100%);
      border: 1px solid rgba(35,35,35,0.20);
      box-shadow: 0 10px 24px rgba(0,0,0,0.14);
    }

    .form-row input,
    .form-row select {
      height: 44px;
      border-radius: 9px;
      background: linear-gradient(180deg, #f9f9f9 0%, #eeeeee 100%);
      border: 1px solid rgba(35,35,35,0.24);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.88),
        inset 0 -1px 0 rgba(0,0,0,0.06),
        0 5px 10px rgba(0,0,0,0.06);
    }

    .submit-btn,
    .complete-confirm {
      border-radius: 10px !important;
      border: 1px solid rgba(20,20,20,0.28) !important;
      background: linear-gradient(180deg, #ffffff 0%, #e2e3e8 54%, #c4c7d1 100%) !important;
      color: #151515 !important;
      text-shadow: 0 1px 0 rgba(255,255,255,0.70) !important;
      position: relative;
      overflow: hidden;
      transform: none !important;
      -webkit-transform: none !important;
      transition: filter 0.14s ease, box-shadow 0.14s ease !important;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.82),
        inset 0 -2px 0 rgba(0,0,0,0.10),
        0 7px 14px rgba(0,0,0,0.13) !important;
    }

    .submit-btn::after,
    .complete-confirm::after {
      content: "";
      position: absolute;
      left: 8px;
      right: 8px;
      top: 3px;
      height: 42%;
      border-radius: 9px 9px 5px 5px;
      background: linear-gradient(180deg, rgba(255,255,255,0.58), rgba(255,255,255,0.08));
      pointer-events: none;
    }

    .submit-btn:active,
    .complete-confirm:active {
      transform: none !important;
      -webkit-transform: none !important;
      filter: brightness(0.97) !important;
    }

    .upload-title {
      margin-top: 14px;
      padding-top: 8px;
      border-top: 1px solid rgba(0,0,0,0.14);
    }


    /* v71 회원가입 전체 폼/입력칸 그림자 강화 + 파일 미선택 문구 숨김: 기능 변경 없음 */
    .signup-panel {
      border-radius: 16px !important;
      border: 1px solid rgba(20,20,20,0.32) !important;
      background: linear-gradient(180deg, #eeeeee 0%, #d7d7d7 54%, #c3c3c3 100%) !important;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.88),
        inset 0 -3px 0 rgba(0,0,0,0.10),
        0 4px 0 rgba(80,80,80,0.16),
        0 16px 34px rgba(0,0,0,0.28),
        0 0 0 1px rgba(255,255,255,0.24) !important;
    }

    .form-row input,
    .form-row select {
      border-radius: 11px !important;
      border: 1px solid rgba(25,25,25,0.30) !important;
      background: linear-gradient(180deg, #ffffff 0%, #eeeeee 100%) !important;
      box-shadow:
        inset 0 2px 4px rgba(0,0,0,0.10),
        inset 0 1px 0 rgba(255,255,255,0.92),
        0 6px 12px rgba(0,0,0,0.11) !important;
    }

    .form-row input[type="file"] {
      color: transparent !important;
      text-shadow: none !important;
      padding: 8px 9px !important;
    }

    .form-row input[type="file"]::file-selector-button {
      color: #151515 !important;
      font-family: inherit;
      border-radius: 8px;
      border: 1px solid rgba(20,20,20,0.26);
      background: linear-gradient(180deg, #ffffff 0%, #e2e3e8 54%, #c4c7d1 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.80),
        0 3px 7px rgba(0,0,0,0.12);
    }

    .form-row input[type="file"]::-webkit-file-upload-button {
      color: #151515 !important;
      font-family: inherit;
      border-radius: 8px;
      border: 1px solid rgba(20,20,20,0.26);
      background: linear-gradient(180deg, #ffffff 0%, #e2e3e8 54%, #c4c7d1 100%);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.80),
        0 3px 7px rgba(0,0,0,0.12);
    }

  </style>
</head>

<body>
  <div class="signup-wrap">

    <div class="logo-area">
      <img src="../image/logo.png" alt="로고">
    </div>

    <form class="signup-panel" id="signupForm" novalidate>
<div class="form-row">
        <label for="userId">아이디</label>
        <input id="userId" name="userId" type="text" minlength="4" autocomplete="username" required>
      </div>

      <div class="form-row">
        <label for="password">비밀번호</label>
        <input id="password" name="password" type="password" minlength="4" autocomplete="new-password" required>
      </div>

      <div class="form-row">
        <label for="nickname">닉네임</label>
        <input id="nickname" name="nickname" type="text" required>
      </div>

      <div class="form-row">
        <label for="phone">휴대폰번호</label>
        <input id="phone" name="phone" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="11" autocomplete="tel" required>
      </div>

      <div class="form-row">
        <label for="realName">이름</label>
        <input id="realName" name="realName" type="text" required>
      </div>

      <div class="form-row">
        <label for="bank">은행정보</label>
        <select id="bank" name="bank" required>
                    <option value="">은행 선택</option>
          <option>카카오뱅크</option>
          <option>SC제일은행</option>
          <option>국민은행</option>
          <option>신한은행</option>
          <option>우리은행</option>
          <option>기업은행</option>
          <option>케이뱅크</option>
          <option>씨티은행</option>
          <option>광주은행</option>
          <option>수협은행</option>
          <option>신협은행</option>
          <option>우체국</option>
          <option>부산은행</option>
          <option>제주은행</option>
          <option>새마을금고</option>
          <option>전북은행</option>
          <option>하나은행</option>
          <option>농협은행</option>
          <option>IM뱅크</option>
          <option>경남은행</option>
          <option>산업은행</option>
          <option>산림조합</option>
          <option>토스뱅크</option>
        </select>
      </div>
<div class="form-row">
        <label for="accountNumber">계좌번호</label>
        <input id="accountNumber" name="accountNumber" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="20" autocomplete="off" required>
      </div>

      <div class="form-row">
        <label for="exchangePassword">환전비밀번호</label>
        <input id="exchangePassword" name="exchangePassword" type="password" inputmode="numeric" pattern="[0-9]{4}" maxlength="4" title="숫자 4자리" required>
      </div>


      <div class="upload-title">-이용내역-</div>

      <div class="form-row">
        <label for="historyImage1">사진 업로드 1</label>
        <input id="historyImage1" name="historyImage1" type="file" accept="image/*">
      </div>

      <div class="form-row">
        <label for="historyImage2">사진 업로드 2</label>
        <input id="historyImage2" name="historyImage2" type="file" accept="image/*">
      </div>

      <div class="notice" id="noticeText"></div>

      <button class="submit-btn shine-btn" type="submit">회원가입</button>
</form>
  </div>


  <div class="complete-modal" id="completeModal">
    <div class="complete-box">
      <div class="complete-title">회원가입 완료</div>
      <button type="button" class="complete-confirm" id="completeConfirmBtn">확인</button>
    </div>
  </div>


  <script>
    const STORAGE_KEY = "signupMembers";
    const noticeText = document.getElementById("noticeText");
    const completeModal = document.getElementById("completeModal");
    const completeConfirmBtn = document.getElementById("completeConfirmBtn");

    function getMembers() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch (e) {
        return [];
      }
    }

    function saveMembers(members) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(members));
    }

    function readImageFile(inputId) {
      const input = document.getElementById(inputId);
      const file = input && input.files && input.files[0] ? input.files[0] : null;

      return new Promise(function(resolve) {
        if (!file) {
          resolve({ name: "", data: "" });
          return;
        }

        if (!file.type || !file.type.startsWith("image/")) {
          resolve({ error: "이미지 파일만 업로드할 수 있습니다." });
          return;
        }

        if (file.size > 2 * 1024 * 1024) {
          resolve({ error: "사진은 1장당 2MB 이하만 업로드 가능합니다." });
          return;
        }

        const reader = new FileReader();
        reader.onload = function() {
          resolve({ name: file.name, data: String(reader.result || "") });
        };
        reader.onerror = function() {
          resolve({ error: "사진을 읽지 못했습니다." });
        };
        reader.readAsDataURL(file);
      });
    }

    function onlyNumbers(el) {
      if (!el) return;
      el.value = el.value.replace(/[^0-9]/g, "");
    }

    ["phone", "accountNumber", "exchangePassword"].forEach(function(id) {
      const el = document.getElementById(id);
      if (el) {
        ["input", "change", "blur"].forEach(function(eventName) {
          el.addEventListener(eventName, function() {
            onlyNumbers(el);
          });
        });
        el.addEventListener("paste", function() {
          setTimeout(function() {
            onlyNumbers(el);
          }, 0);
        });
      }
    });

    function setError(inputId, message) {
      const input = document.getElementById(inputId);
      if (!input) return false;

      const row = input.closest(".form-row");
      if (row) row.classList.add("error");

      noticeText.textContent = message;
      input.focus();
      return false;
    }

    function clearErrors() {
      document.querySelectorAll(".form-row.error").forEach(function(row) {
        row.classList.remove("error");
      });
      noticeText.textContent = "";
    }

    function requireValue(inputId, message) {
      const input = document.getElementById(inputId);
      if (!input || !input.value.trim()) {
        return setError(inputId, message);
      }
      return true;
    }

    document.getElementById("signupForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      clearErrors();

      const userId = document.getElementById("userId").value.trim();
      const password = document.getElementById("password").value.trim();
      const nickname = document.getElementById("nickname").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const realName = document.getElementById("realName").value.trim();
      const bank = document.getElementById("bank").value.trim();
const accountNumber = document.getElementById("accountNumber").value.trim();
      const exchangePassword = document.getElementById("exchangePassword").value.trim();

      if (!requireValue("userId", "빈칸을 채워주세요.")) return;
      if (!requireValue("password", "빈칸을 채워주세요.")) return;
      if (!requireValue("nickname", "빈칸을 채워주세요.")) return;
      if (!requireValue("phone", "빈칸을 채워주세요.")) return;
      if (!requireValue("realName", "빈칸을 채워주세요.")) return;
      if (!bank) return setError("bank", "빈칸을 채워주세요.");
      if (!requireValue("accountNumber", "빈칸을 채워주세요.")) return;
      if (!requireValue("exchangePassword", "환전빈칸을 채워주세요.")) return;

      if (userId.length < 4) {
        return setError("userId", "아이디는 4글자 이상 입력하세요.");
      }

      if (password.length < 4) {
        return setError("password", "비밀번호는 4글자 이상 입력하세요.");
      }

      if (!/^[0-9]+$/.test(phone)) {
        return setError("phone", "휴대폰 번호는 숫자만 입력하세요.");
      }

if (!/^[0-9]+$/.test(accountNumber)) {
        return setError("accountNumber", "계좌번호는 숫자만 입력하세요.");
      }

      if (!/^[0-9]{4}$/.test(exchangePassword)) {
        return setError("exchangePassword", "환전비밀번호는 숫자 4자리입니다.");
      }

      const members = getMembers();

      if (members.some(member => member.userId === userId)) {
        return setError("userId", "이미 사용중인 아이디입니다.");
      }

      if (members.some(member => member.nickname === nickname)) {
        return setError("nickname", "이미 사용중인 닉네임입니다.");
      }

      if (members.some(member => member.accountNumber === accountNumber)) {
        return setError("accountNumber", "이미 등록된 계좌번호입니다.");
      }

      const historyImage1 = await readImageFile("historyImage1");
      const historyImage2 = await readImageFile("historyImage2");

      if (historyImage1.error) {
        noticeText.textContent = historyImage1.error;
        return;
      }

      if (historyImage2.error) {
        noticeText.textContent = historyImage2.error;
        return;
      }

      const member = {
        nickname: nickname,
        realName: realName,
        bank: bank,
        accountHolder: realName,
        accountNumber: accountNumber,
        phone: phone,
        userId: userId,
        password: password,
        exchangePassword: exchangePassword,
        historyImage1: historyImage1,
        historyImage2: historyImage2,
        status: "pending",
        createdAt: new Date().toISOString()
      };

      members.push(member);
      saveMembers(members);

      completeModal.classList.add("active");
    });

    completeConfirmBtn.addEventListener("click", function() {
      location.href = "../login/login.html";
    });

    // 더블탭 확대 방지
    let lastTouchEnd = 0;
    document.addEventListener("touchend", function(event) {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }
      lastTouchEnd = now;
    }, false);
  </script>
</body>
</html>
